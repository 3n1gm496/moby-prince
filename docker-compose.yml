version: "3.9"

# Local development stack — mirrors Cloud Run production layout.
# Prerequisites:
#   1. cp backend/.env.example backend/.env  → fill in your values
#   2. gcloud auth application-default login  → creates ADC credentials

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - backend/.env
    environment:
      # Override NODE_ENV for local dev (env_file may set it to 'development' too)
      NODE_ENV: development
      FRONTEND_ORIGIN: http://localhost:5173
    volumes:
      # Mount Application Default Credentials from host
      # The non-root 'node' user in the container reads from /home/node/.config
      - ${HOME}/.config/gcloud:/home/node/.config/gcloud:ro
    healthcheck:
      test: >
        node -e "require('http').get('http://localhost:3001/api/health',
          r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
