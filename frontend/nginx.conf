server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "SAMEORIGIN"       always;
    add_header Referrer-Policy         "strict-origin"    always;
    add_header X-XSS-Protection        "1; mode=block"    always;

    # Content Security Policy
    # style-src 'unsafe-inline': required for Tailwind inline style attributes
    # img-src data: blob:: SVG data URIs and object URLs (export/print features)
    # connect-src 'self': fetch() calls to /api/* only
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
        always;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy /api calls to the backend service
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Hashed assets — long-lived cache (Vite appends content hash to filenames)
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
